<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Play Point</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0b0c;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }
        .container {
            max-width: 600px;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ff4757;
            text-decoration: none;
            letter-spacing: 1px;
            margin-bottom: 30px;
            display: inline-block;
        }
        .logo span {
            color: #ffffff;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }
        p {
            color: #a4b0be;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        /* Ek simple loader element */
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #1e1e24;
            border-top: 3px solid #ff4757;
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        footer {
            position: absolute;
            bottom: 20px;
            color: #57606f;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Endless<span>PlayPoint</span></div>
        <h1>Something Epic is Brewing</h1>
        <p>We are currently building the ultimate digital arena. No distractions, no filler—just pure gaming. Stay tuned.</p>
        <div class="loader"></div>
    </div>

    <footer>
        &copy; 2026 Endless Play Point. All Rights Reserved.
    </footer>

</body>
</html>
