<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Play Point</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0b0c;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ff4757;
            text-decoration: none;
            letter-spacing: 1px;
            margin-bottom: 25px;
            display: inline-block;
        }
        .logo span {
            color: #ffffff;
        }
        p {
            color: #a4b0be;
            font-size: 1.3rem;
            line-height: 1.6;
        }
        footer {
            position: absolute;
            bottom: 25px;
            color: #57606f;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Endless<span>PlayPoint</span></div>
        <p>We are currently working on launching our first game. Stay tuned.</p>
    </div>

    <footer>
        &copy; 2026 Endless Play Point. All Rights Reserved.
    </footer>

</body>
</html>
